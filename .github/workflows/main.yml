name: Build TTMD Player

on:
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove Automotive Manifest Conflict (Play Console Fix)
        run: |
          find . -name "AndroidManifest.xml" -exec sed -i '/android.hardware.type.automotive/d' {} +

      - name: Enforce TTMD Package Name
        run: |
          find . -name "build.gradle" -exec sed -i 's/sumit/ttmd/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/sumit/ttmd/g' {} +

      - name: Build Release App Bundle (.aab)
        env:
          # Sets the internal package suffix to ttmd
          APP_ID_SFX: .ttmd.player
        run: ./gradlew bundleRelease

      - name: Sign App Bundle
        uses: r0adkll/sign-android-release@v3
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: my-key-alias
          keyStorePassword: Fermata2026!
          keyPassword: Fermata2026!

      - name: Upload Signed AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTMD-Player-Bundle
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
