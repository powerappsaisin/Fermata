name: Build Custom Fermata Auto
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Recreate Kiro Keystore & Configure Signing
        run: |
          # 1. Create the exact same keystore file Kiro generated
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Sumit, C=IN" -storepass Fermata2026! -keypass Fermata2026!
          
          # 2. Tell the app to use this keystore by creating a local.properties file
          echo "storeFile=$(pwd)/my-release-key.keystore" > local.properties
          echo "keyAlias=my-key-alias" >> local.properties
          echo "keyPassword=Fermata2026!" >> local.properties
          echo "storePassword=Fermata2026!" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android App Bundle
        run: ./gradlew bundleAutoRelease -PAPP_ID_SFX=.sumit.auto

      - name: Upload Signed App Bundle (.aab)
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-signed-aab
          path: ./**/*.aab

      - name: Upload Keystore File (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-backup
          path: my-release-key.keystore
