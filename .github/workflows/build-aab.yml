name: Build TTMD Player (v268)

on:
  workflow_dispatch:

env:
  # Skips Google Drive modules to keep the build fast and clean
  NO_GS: "1"
  # Forces the exact version code needed to bypass Play Console duplication errors
  FORCED_VERSION_CODE: "268"
  # Ensures your app has a unique identifier: me.aap.fermata.auto.ttmd
  APP_ID_SFX: ".ttmd"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Force versionCode to ${{ env.FORCED_VERSION_CODE }}
        run: |
          set -euo pipefail
          file="gradle/libs.versions.toml"
          test -f "$file"
          sed -i -E "s/^appVersionCode = \"[0-9]+\"/appVersionCode = \"${FORCED_VERSION_CODE}\"/" "$file"
          echo "Verified TOML Patch:"
          grep -E '^appVersionCode' "$file"
          grep -qE "^appVersionCode = \"${FORCED_VERSION_CODE}\"$" "$file" || { echo "::error::Failed to set appVersionCode"; exit 1; }

      - name: Replace automotive feature with touchscreen
        run: |
          set -euo pipefail
          file="fermata/src/auto/AndroidManifest.xml"
          test -f "$file"
          grep -q "android.hardware.type.automotive" "$file" || { echo "::error::automotive feature not found"; exit 1; }
          sed -i "s/android\.hardware\.type\.automotive/android.hardware.touchscreen/g" "$file"
          if grep -q "android.hardware.type.automotive" "$file"; then
            echo "::error::automotive feature still present"; exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Configure signing keystore (Optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          set -euo pipefail
          echo "$KEYSTORE_BASE64" | base64 -d > res/fermata.jks
          cat > local.properties <<EOF
          storeFile=$(pwd)/res/fermata.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build TTMD Player Bundle
        run: ./gradlew :fermata:bundleAutoRelease -PAPP_ID_SFX=${{ env.APP_ID_SFX }} --stacktrace

      - name: Locate Compiled AAB
        id: aab
        run: |
          set -euo pipefail
          path="$(find fermata/build/outputs/bundle -name '*.aab' | head -n1)"
          test -n "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload TTMD-Player-Bundle-v268
        uses: actions/upload-artifact@v4
        with:
          name: TTMD-Player-Bundle-v268
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: error
